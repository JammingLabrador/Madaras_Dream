<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Dark Form</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      margin: 0;
      background: #0f1117;
      color: #e6e6e6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #161a22;
      padding: 30px;
      border-radius: 16px;
      width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    p {
      font-size: 14px;
      color: #a0a0a0;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #cfcfcf;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 18px;
      border-radius: 8px;
      border: 1px solid #2a2f3a;
      background: #0f1117;
      color: #e6e6e6;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus {
      border-color: #4a90e2;
      box-shadow: 0 0 0 2px rgba(74,144,226,0.2);
    }

    .radio-group {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #4a90e2;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #3a78c2;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>User Details</h1>
    <p>
      Please fill out the form below. This information will be used to personalize your experience
      and improve overall service quality.
    </p>

    <form action="/" method="POST">

      <label for="username">Username</label>
      <input type="text" id="username" name="username">

      <label for="country">Country</label>
      <select id="country" name="country">
        {% for name in country_names %}
            <option value="{{ name }}">{{ name }}</option>
        {% endfor %}
      </select>

      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" name="dob">

      <label>Sex</label>
      <div class="radio-group">
        <label><input type="radio" name="sex" value="Male"> Male</label>
        <label><input type="radio" name="sex" value="Female"> Female</label>
        <label><input type="radio" name="sex" value="Other"> Other</label>
      </div>

      <button type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
