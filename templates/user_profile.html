<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile Dashboard</title>
</head>
<body style="margin:0; font-family:Arial, sans-serif; background:#0f172a; color:#e2e8f0; display:flex; justify-content:center; align-items:center; height:100vh;">

<div style="background:rgba(30,41,59,0.6); backdrop-filter:blur(20px); border:1px solid rgba(148,163,184,0.2); border-radius:20px; padding:30px; width:350px; box-shadow:0 0 40px rgba(0,0,0,0.6);">

    <!-- Profile Image -->
    <div style="display:flex; justify-content:center; margin-bottom:25px;">
        <div style="width:100px; height:100px; border-radius:50%; background:linear-gradient(135deg,#38bdf8,#6366f1); display:flex; align-items:center; justify-content:center; font-size:40px; font-weight:bold;">
            <img src="{{ image_url }}" style="width:100%; height:100%; object-fit:cover;">
        </div>
    </div>

    <!-- Info Slots -->
    <div style="display:flex; flex-direction:column; gap:15px;">

        <div style="background:rgba(15,23,42,0.7); padding:12px 15px; border-radius:12px; border:1px solid rgba(148,163,184,0.15);">
            <div style="font-size:12px; color:#94a3b8;">Username</div>
            <div style="font-size:16px;">{{ session.get("user_info")[0] }}</div>
        </div>

        <div style="background:rgba(15,23,42,0.7); padding:12px 15px; border-radius:12px; border:1px solid rgba(148,163,184,0.15);">
            <div style="font-size:12px; color:#94a3b8;">Country</div>
            <div style="font-size:16px;">{{ session.get("user_info")[1] }}</div>
        </div>

        <div style="background:rgba(15,23,42,0.7); padding:12px 15px; border-radius:12px; border:1px solid rgba(148,163,184,0.15);">
            <div style="font-size:12px; color:#94a3b8;">Date of Birth</div>
            <div style="font-size:16px;">{{ session.get("user_info")[2] }}</div>
        </div>

        <div style="background:rgba(15,23,42,0.7); padding:12px 15px; border-radius:12px; border:1px solid rgba(148,163,184,0.15);">
            <div style="font-size:12px; color:#94a3b8;">Sex</div>
            <div style="font-size:16px;">{{ session.get("user_info")[3] }}</div>
        </div>

    </div>

</div>

</body>
</html>
